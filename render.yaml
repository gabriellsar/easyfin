databases:
  - name: easyfin-db
    plan: free

services:
  - type: web
    name: easyfin-backend
    runtime: python
    plan: free
    rootDir: backend
  
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.5
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: easyfin-db
          property: connectionString
      - key: MARKET_DATA_PROVIDER
        value: real
      - key: BRAPI_TOKEN
        sync: false # preencher no painel do Render
